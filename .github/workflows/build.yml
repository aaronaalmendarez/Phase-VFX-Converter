name: Build Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller eel Pillow requests

    - name: Build with PyInstaller (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onefile --noconsole --name "PhaseConverter" --icon NONE --add-data "web:web" app.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --noconsole --name "PhaseConverter" --icon NONE --add-data "web;web" app.py

    - name: Create DMG (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install create-dmg
        
        # Pyinstaller outputs PhaseConverter.app to dist/
        # Use create-dmg to bundle it
        create-dmg \
          --volname "Phase Converter" \
          --window-size 500 300 \
          --icon-size 100 \
          --icon "PhaseConverter.app" 125 120 \
          --hide-extension "PhaseConverter.app" \
          --app-drop-link 375 120 \
          dist/PhaseConverter-Mac.dmg \
          dist/PhaseConverter.app

    - name: Rename EXE (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        ren dist\PhaseConverter.exe PhaseConverter-Windows.exe

    - name: Release to GitHub
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/PhaseConverter-Windows.exe
          dist/PhaseConverter-Mac.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts (Fallback)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v3
      with:
        name: PhaseConverter-${{ matrix.os }}
        path: |
          dist/PhaseConverter-Windows.exe
          dist/PhaseConverter-Mac.dmg

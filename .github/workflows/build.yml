name: Build Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller eel Pillow requests

    - name: Build with PyInstaller
      run: |
        python -m eel app.py web --onefile --noconsole --name "PhaseConverter"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: PhaseConverter-${{ matrix.os }}
        path: dist/
